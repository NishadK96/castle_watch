<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Castle Watch account and shield monitoring companion.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Castle Watch">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Castle Watch</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    window.castleWatchShowPlaySession = async function (
      sessionId, secret, accountName, position, total, supabaseUrl, anonKey
    ) {
      const registration = await navigator.serviceWorker.ready;
      await registration.showNotification(`Play ${accountName}`, {
        body: `Account ${position} of ${total}`,
        icon: 'icons/Icon-192.png',
        badge: 'icons/Icon-192.png',
        tag: 'castle-watch-play-session',
        renotify: true,
        requireInteraction: true,
        actions: [
          { action: 'played', title: 'Played & next' },
          { action: 'skip', title: 'Skip' },
          { action: 'stop', title: 'Stop' }
        ],
        data: { sessionId, secret, supabaseUrl, anonKey }
      });
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
